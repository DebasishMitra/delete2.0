<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber World Gateway | Click Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #0af;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 170, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 170, 0.05) 0%, transparent 50%);
        }
        
        .container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 170, 255, 0.3);
            box-shadow: 
                0 0 50px rgba(0, 170, 255, 0.2),
                inset 0 0 30px rgba(0, 170, 255, 0.1);
            position: relative;
            z-index: 2;
            max-width: 500px;
            width: 90%;
        }
        
        .glitch-text {
            font-size: 3rem;
            font-weight: bold;
            color: #0af;
            text-shadow: 
                0 0 10px #0af,
                0 0 20px #0af,
                0 0 30px #0af;
            margin-bottom: 30px;
            position: relative;
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translateX(0); }
            92% { transform: translateX(-2px); }
            94% { transform: translateX(2px); }
            96% { transform: translateX(-1px); }
            98% { transform: translateX(1px); }
        }
        
        .cyber-btn {
            background: linear-gradient(45deg, #00aaff, #00ffaa);
            color: #000;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 30px rgba(0, 170, 255, 0.5),
                0 0 60px rgba(0, 255, 170, 0.3);
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                box-shadow: 
                    0 0 30px rgba(0, 170, 255, 0.5),
                    0 0 60px rgba(0, 255, 170, 0.3);
            }
            50% { 
                box-shadow: 
                    0 0 40px rgba(0, 170, 255, 0.7),
                    0 0 80px rgba(0, 255, 170, 0.5);
            }
        }
        
        .cyber-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 0 40px rgba(0, 170, 255, 0.7),
                0 0 80px rgba(0, 255, 170, 0.5);
        }
        
        .counter-display {
            font-size: 2rem;
            margin: 20px 0;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            font-family: 'Courier New', monospace;
        }
        
        .instruction {
            color: #8af;
            margin-bottom: 30px;
            font-size: 1.2rem;
            line-height: 1.6;
        }
        
        .youtube-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(45deg, #ff0000, #ff5555);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            margin-top: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: youtubeGlow 2s infinite;
        }
        
        @keyframes youtubeGlow {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            }
            50% { 
                box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
            }
        }
        
        .youtube-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
        }
        
        .youtube-icon {
            font-size: 1.5rem;
        }
        
        .cyber-world {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        
        .cyber-text {
            font-size: 5rem;
            color: #0f0;
            text-shadow: 
                0 0 10px #0f0,
                0 0 20px #0f0,
                0 0 40px #0f0;
            animation: cyberGlitch 0.5s infinite;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin-bottom: 50px;
        }
        
        @keyframes cyberGlitch {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 1s;
        }
        
        .hacker-text {
            color: #0f0;
            font-size: 1.5rem;
            margin-top: 30px;
            text-align: center;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        .countdown {
            font-size: 3rem;
            color: #f00;
            margin-top: 20px;
            text-shadow: 0 0 10px #f00;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    
    <div class="container">
        <div class="glitch-text">CYBER GATEWAY</div>
        
        <div class="instruction">
            Click the button 20 times<br>
            to unlock the cyber world portal
        </div>
        
        <div class="counter-display" id="counter">CLICKS: 0/20</div>
        
        <button class="cyber-btn" id="click-btn">
            ACTIVATE PORTAL
        </button>
        
    </div>
    
    <div class="cyber-world" id="cyberWorld">
        <div class="cyber-text">WELCOME TO CYBER WORLD</div>
        <div class="hacker-text">// Access granted to hidden network</div>
        <div class="hacker-text">// Initializing quantum encryption...</div>
        <div class="countdown" id="countdown">5</div>
    </div>

    <script>
        const clickBtn = document.getElementById('click-btn');
        const counter = document.getElementById('counter');
        const cyberWorld = document.getElementById('cyberWorld');
        const matrixCanvas = document.getElementById('matrix-canvas');
        const particleCanvas = document.getElementById('particle-canvas');
        const matrixCtx = matrixCanvas.getContext('2d');
        const particleCtx = particleCanvas.getContext('2d');
        
        let clickCount = 0;
        let particles = [];
        let matrixChars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
        let matrixDrops = [];
        
        // Set canvas sizes
        function resizeCanvases() {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            
            // Initialize matrix rain
            matrixDrops = [];
            for (let i = 0; i < 100; i++) {
                matrixDrops[i] = {
                    x: Math.random() * matrixCanvas.width,
                    y: Math.random() * matrixCanvas.height,
                    speed: Math.random() * 5 + 3,
                    char: matrixChars[Math.floor(Math.random() * matrixChars.length)]
                };
            }
        }
        
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);
        
        // Matrix rain animation
        function drawMatrix() {
            matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            
            matrixCtx.fillStyle = '#0f0';
            matrixCtx.font = '15px monospace';
            
            matrixDrops.forEach(drop => {
                matrixCtx.fillText(drop.char, drop.x, drop.y);
                drop.y += drop.speed;
                
                if (drop.y > matrixCanvas.height) {
                    drop.y = 0;
                    drop.x = Math.random() * matrixCanvas.width;
                }
                
                drop.char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
            });
        }
        
        // Particle class for cyber effects
        class CyberParticle {
            constructor(x, y, type = 'normal') {
                this.x = x;
                this.y = y;
                this.type = type;
                
                if (type === 'binary') {
                    this.size = Math.random() * 10 + 5;
                    this.speedX = Math.random() * 4 - 2;
                    this.speedY = Math.random() * -8 - 4;
                    this.text = Math.random() > 0.5 ? '0' : '1';
                    this.color = '#0f0';
                } else {
                    this.size = Math.random() * 8 + 4;
                    this.speedX = Math.random() * 6 - 3;
                    this.speedY = Math.random() * -6 - 3;
                    this.color = `hsl(${Math.random() * 60 + 160}, 100%, 50%)`;
                }
                
                this.gravity = 0.1;
                this.life = 100;
            }
            
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
            }
            
            draw() {
                particleCtx.save();
                particleCtx.globalAlpha = this.life / 100;
                
                if (this.type === 'binary') {
                    particleCtx.fillStyle = this.color;
                    particleCtx.font = `${this.size}px monospace`;
                    particleCtx.fillText(this.text, this.x, this.y);
                } else {
                    particleCtx.fillStyle = this.color;
                    particleCtx.beginPath();
                    particleCtx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    particleCtx.fill();
                }
                
                particleCtx.restore();
            }
        }
        
        // Create particle explosion
        function createExplosion(x, y, count = 50) {
            for (let i = 0; i < count; i++) {
                particles.push(new CyberParticle(x, y, i % 2 === 0 ? 'binary' : 'normal'));
            }
        }
        
        // Animation loop
        function animate() {
            // Clear particle canvas with fade
            particleCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            particleCtx.fillRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Draw matrix rain if cyber world is active
            if (cyberWorld.style.display === 'flex') {
                drawMatrix();
            }
            
            requestAnimationFrame(animate);
        }
        
        // Button click handler
        clickBtn.addEventListener('click', function(e) {
            clickCount++;
            counter.textContent = `CLICKS: ${clickCount}/20`;
            
            // Create explosion at button position
            const rect = this.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createExplosion(x, y, 30);
            
            // Button animation
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 100);
            
            // Change button color based on clicks
            const progress = clickCount / 20;
            const hue = 160 + (progress * 120); // Blue to Green
            this.style.background = `linear-gradient(45deg, hsl(${hue}, 100%, 50%), hsl(${hue + 40}, 100%, 50%))`;
            
            // Check if reached 20 clicks
            if (clickCount === 20) {
                setTimeout(() => {
                    activateCyberWorld();
                }, 500);
            }
        });
        
        // Activate cyber world
        function activateCyberWorld() {
            // Hide main container
            document.querySelector('.container').style.opacity = '0';
            document.querySelector('.container').style.pointerEvents = 'none';
            
            // Show cyber world
            cyberWorld.style.display = 'flex';
            
            // Create massive explosion
            createExplosion(window.innerWidth / 2, window.innerHeight / 2, 500);
            
            // Start countdown
            let count = 5;
            const countdown = document.getElementById('countdown');
            countdown.textContent = count;
            
            const countdownInterval = setInterval(() => {
                count--;
                countdown.textContent = count;
                
                if (count === 0) {
                    clearInterval(countdownInterval);
                    redirectToCyberSite();
                }
            }, 1000);
        }
        
        // Redirect to cyber site
        function redirectToCyberSite() {
            window.location.href = '/index.html';
        }
        
        // Start animations
        animate();
        
        // Auto-click hints
        let autoHint = 0;
        const autoHintInterval = setInterval(() => {
            if (clickCount < 20) {
                autoHint++;
                if (autoHint % 10 === 0) {
                    createExplosion(
                        Math.random() * window.innerWidth,
                        Math.random() * window.innerHeight,
                        10
                    );
                }
            } else {
                clearInterval(autoHintInterval);
            }
        }, 1000);
        
        // YouTube button hover effect
        document.querySelector('.youtube-btn').addEventListener('mouseenter', () => {
            createExplosion(
                Math.random() * window.innerWidth,
                Math.random() * window.innerHeight,
                20
            );
        });
    </script>
</body>
</html>
